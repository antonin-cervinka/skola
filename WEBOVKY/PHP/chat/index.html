<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Appka</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .chat-container { max-width: 500px; margin: 0 auto; }
        .inputs { display: flex; gap: 10px; margin-bottom: 10px; }
        #chat-box { 
            height: 300px; 
            border: 2px solid #ccc; 
            padding: 10px; 
            overflow-y: scroll; 
            margin-bottom: 10px;
            background: #f9f9f9;
        }
        .message-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .message-input { flex-grow: 1; padding: 5px; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Super tajný chat</h2>
    
    <div class="inputs">
        <input type="text" id="jmeno" placeholder="Tvoje jméno" required>
        <input type="text" id="roomka" placeholder="Název roomky (např. test)" required>
    </div>

    <div id="chat-box"></div>

    <div class="message-row">
        <input type="text" id="zprava" class="message-input" placeholder="Napiš zprávu...">
        <button id="btn-send">Send</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
